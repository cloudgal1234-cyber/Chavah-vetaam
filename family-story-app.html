<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#C9A84C">
  <title>ספר המשפחה שלנו ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== VARIABLES ===== */
    :root {
      --bg:           #FBF9F6;
      --surface:      #FFFFFF;
      --border:       #EAE4D9;
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.06);
      --shadow-md:    0 4px 20px rgba(0,0,0,0.10);
      --shadow-lg:    0 8px 40px rgba(0,0,0,0.14);
      --r-sm:  10px;
      --r-md:  16px;
      --r-lg:  24px;
      --r-full: 999px;
      --text:        #2A2118;
      --text-sec:    #6B5F52;
      --text-light:  #9C8E82;
      --mom-50:  #FDF2F5; --mom-100: #FAE0E7;
      --mom-300: #E8A0B4; --mom-500: #C0697A; --mom-700: #8E3D4E;
      --dad-50:  #EFF6FB; --dad-100: #D9EBF7;
      --dad-300: #89BAD9; --dad-500: #4A7C9E; --dad-700: #2E5570;
      --gold:       #C9A84C;
      --gold-light: #F7EED5;
      --green:  #3D9E6A;
      --font: 'Heebo', system-ui, sans-serif;
    }

    /* ===== BASE ===== */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      text-align: right;
      -webkit-font-smoothing: antialiased;
    }
    #app { min-height: 100vh; }
    html { scroll-behavior: smooth; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { font-family: var(--font); }
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* ===== TYPOGRAPHY ===== */
    h1 { font-size: clamp(26px, 6vw, 44px); font-weight: 800; line-height: 1.2; }
    h2 { font-size: clamp(20px, 4vw, 30px); font-weight: 700; line-height: 1.3; }
    h3 { font-size: clamp(17px, 3vw, 22px); font-weight: 600; line-height: 1.4; }
    p  { line-height: 1.8; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border: none; border-radius: var(--r-full);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--gold);     color: #fff; }
    .btn-primary:hover  { background: #b89040; }
    .btn-mom      { background: var(--mom-500);  color: #fff; }
    .btn-mom:hover      { background: var(--mom-700); }
    .btn-dad      { background: var(--dad-500);  color: #fff; }
    .btn-dad:hover      { background: var(--dad-700); }
    .btn-outline  { background: transparent; border: 2px solid var(--border); color: var(--text-sec); }
    .btn-outline:hover  { border-color: var(--text-sec); }
    .btn-ghost    { background: transparent; color: var(--text-sec); }
    .btn-ghost:hover    { background: var(--border); }
    .btn-danger   { background: #e74c3c; color: #fff; }
    .btn-danger:hover   { background: #c0392b; }
    .btn-sm   { padding: 8px 16px;  font-size: 14px; }
    .btn-lg   { padding: 18px 36px; font-size: 18px; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ===== FORMS ===== */
    .form-group  { margin-bottom: 22px; }
    .form-label  { display: block; font-size: 14px; font-weight: 600; color: var(--text-sec); margin-bottom: 8px; }
    .form-input, .form-textarea {
      width: 100%; padding: 14px 18px;
      border: 2px solid var(--border); border-radius: var(--r-md);
      font-family: var(--font); font-size: 16px; color: var(--text);
      background: var(--surface); transition: border-color 0.2s;
      direction: rtl;
    }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold); }
    .form-textarea { min-height: 180px; line-height: 1.8; resize: vertical; }
    .form-textarea.large { min-height: 260px; font-size: 18px; }

    /* ===== CARD ===== */
    .card { background: var(--surface); border-radius: var(--r-md); padding: 20px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }

    /* ===== BADGES ===== */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: var(--r-full); font-size: 12px; font-weight: 600; }
    .badge-answered { background: #E8F5EE; color: #2D7A4F; }
    .badge-sent     { background: #FEF9E7; color: #A07800; }
    .badge-not-sent { background: #F0EEE8; color: #888; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--text); color: #fff;
      padding: 14px 24px; border-radius: var(--r-full);
      font-size: 15px; font-weight: 500; z-index: 2000;
      transition: transform 0.3s ease; white-space: nowrap;
      max-width: 90vw; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 1000; display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface); border-radius: var(--r-lg) var(--r-lg) 0 0;
      padding: 28px 20px 36px; width: 100%; max-width: 600px;
      max-height: 88vh; overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

    /* ===== TABS ===== */
    .tabs { display: flex; background: #EDE7DD; border-radius: var(--r-full); padding: 4px; gap: 2px; }
    .tab {
      flex: 1; padding: 10px 12px; border: none; background: transparent;
      border-radius: var(--r-full); font-family: var(--font); font-size: 14px;
      font-weight: 600; color: var(--text-sec); cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow-sm); }

    /* ===== HOME PAGE ===== */
    .home-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--bg) 55%, var(--mom-50) 100%);
    }
    .home-book {
      width: 140px; height: 178px;
      background: linear-gradient(140deg, #D4A84C 0%, #B8903C 100%);
      border-radius: 5px 18px 18px 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; margin-bottom: 32px;
      box-shadow: var(--shadow-lg), -8px 5px 0 #8a6830;
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .home-subtitle { text-align: center; color: var(--text-sec); font-size: 17px; margin-bottom: 40px; max-width: 300px; line-height: 1.7; }
    .home-actions { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 300px; }

    /* ===== ADMIN PAGE ===== */
    .admin-page { max-width: 800px; margin: 0 auto; padding-bottom: 80px; }
    .admin-sticky {
      background: var(--surface); padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .admin-content { padding: 20px; }

    /* ===== QUESTION CARDS ===== */
    .q-card {
      background: var(--surface); border-radius: var(--r-md); padding: 18px 20px;
      margin-bottom: 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .q-text  { font-size: 16px; font-weight: 600; line-height: 1.55; margin-bottom: 14px; }
    .q-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .q-statuses {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-sec);
    }
    .status-row { display: flex; align-items: center; gap: 6px; }

    /* ===== ADD QUESTION BOX ===== */
    .add-q-box {
      background: var(--gold-light); border: 2px dashed var(--gold);
      border-radius: var(--r-md); padding: 20px; margin-bottom: 22px;
    }
    .add-q-box .form-input:focus { border-color: var(--gold); }

    /* ===== OVERVIEW (MOM/DAD ADMIN TAB) ===== */
    .ov-header { padding: 20px; border-radius: var(--r-md); margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
    .ov-header.mom { background: var(--mom-100); }
    .ov-header.dad { background: var(--dad-100); }
    .ov-avatar { font-size: 52px; flex-shrink: 0; }
    .ans-card { background: var(--surface); border-radius: var(--r-md); padding: 18px; margin-bottom: 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .ans-q-label { font-size: 13px; color: var(--text-light); margin-bottom: 6px; font-weight: 500; }
    .ans-q-text  { font-size: 15px; font-weight: 600; color: var(--text-sec); margin-bottom: 12px; line-height: 1.5; }
    .ans-text    { font-size: 16px; line-height: 1.9; }
    .ans-img     { width: 100%; border-radius: var(--r-sm); margin-top: 12px; max-height: 280px; object-fit: cover; }
    .ans-time    { font-size: 12px; color: var(--text-light); margin-top: 10px; }

    /* ===== ANSWER PAGE ===== */
    .answer-page { min-height: 100vh; padding-bottom: 40px; }
    .ans-hero { padding: 44px 24px 32px; text-align: center; }
    .ans-hero.mom { background: linear-gradient(160deg, var(--mom-100) 0%, var(--mom-50) 100%); }
    .ans-hero.dad { background: linear-gradient(160deg, var(--dad-100) 0%, var(--dad-50) 100%); }
    .ans-hero-avatar { font-size: 68px; margin-bottom: 14px; }
    .ans-hero-greeting { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .ans-hero-sub { color: var(--text-sec); font-size: 16px; }

    .q-box {
      margin: 24px 20px 0;
      padding: 20px 20px 20px 20px;
      background: var(--surface); border-radius: var(--r-md);
      border-right: 5px solid;
      box-shadow: var(--shadow-sm);
    }
    .q-box.mom { border-color: var(--mom-500); }
    .q-box.dad { border-color: var(--dad-500); }
    .q-box-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; }
    .q-box-label.mom { color: var(--mom-500); }
    .q-box-label.dad { color: var(--dad-500); }
    .q-box-text { font-size: 21px; font-weight: 700; line-height: 1.45; }

    .ans-form { padding: 24px 20px 0; }

    /* Mic */
    .mic-row { display: flex; align-items: flex-start; gap: 12px; }
    .mic-btn {
      width: 58px; height: 58px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .mic-btn.mom { background: var(--mom-100); color: var(--mom-500); }
    .mic-btn.dad { background: var(--dad-100); color: var(--dad-500); }
    .mic-btn.recording.mom { background: var(--mom-500); color: #fff; animation: pulse-mom 1s ease-in-out infinite; }
    .mic-btn.recording.dad { background: var(--dad-500); color: #fff; animation: pulse-dad 1s ease-in-out infinite; }
    @keyframes pulse-mom {
      0%,100%{ box-shadow: 0 0 0 0 rgba(192,105,122,0.5); }
      50%{ box-shadow: 0 0 0 14px rgba(192,105,122,0); }
    }
    @keyframes pulse-dad {
      0%,100%{ box-shadow: 0 0 0 0 rgba(74,124,158,0.5); }
      50%{ box-shadow: 0 0 0 14px rgba(74,124,158,0); }
    }
    .mic-hint { font-size: 13px; color: var(--text-light); margin-top: 6px; }

    /* Image upload */
    .img-upload-area {
      border: 2px dashed var(--border); border-radius: var(--r-md);
      padding: 28px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .img-upload-area:hover { border-color: var(--gold); background: var(--gold-light); }
    .img-upload-area.mom:hover { border-color: var(--mom-500); background: var(--mom-50); }
    .img-upload-area.dad:hover { border-color: var(--dad-500); background: var(--dad-50); }
    .img-upload-icon { font-size: 42px; margin-bottom: 8px; }
    .img-upload-text { font-size: 16px; font-weight: 500; color: var(--text-sec); }
    .img-upload-sub  { font-size: 13px; color: var(--text-light); margin-top: 4px; }
    .img-preview-wrap { position: relative; }
    .img-preview { width: 100%; border-radius: var(--r-md); max-height: 320px; object-fit: cover; }
    .img-remove-btn {
      position: absolute; top: 10px; left: 10px;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,0.65); color: #fff; border: none;
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .submit-area { padding: 24px 20px; }
    .submit-note { font-size: 13px; color: var(--text-light); text-align: center; margin-top: 10px; }

    /* ===== THANKS PAGE ===== */
    .thanks-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 28px; text-align: center;
    }
    .thanks-page.mom { background: linear-gradient(160deg, var(--mom-50), var(--bg)); }
    .thanks-page.dad { background: linear-gradient(160deg, var(--dad-50), var(--bg)); }
    .thanks-emoji { font-size: 88px; margin-bottom: 24px; animation: bounceIn 0.55s ease; }
    @keyframes bounceIn { 0%{transform:scale(.4);opacity:0} 70%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }
    .thanks-text { color: var(--text-sec); font-size: 18px; line-height: 1.85; max-width: 340px; margin-top: 14px; }

    /* ===== BOOK PAGE ===== */
    .book-page  { max-width: 800px; margin: 0 auto; }
    .book-hero  {
      padding: 48px 24px 32px; text-align: center;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .book-hero-icon { font-size: 60px; margin-bottom: 14px; }
    .book-covers {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; padding: 28px 20px; max-width: 460px; margin: 0 auto;
    }
    .book-cover-btn {
      border-radius: var(--r-md); padding: 30px 16px; text-align: center;
      cursor: pointer; transition: all 0.22s; border: 2px solid transparent;
      background: none;
    }
    .book-cover-btn:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
    .book-cover-btn.mom { background: var(--mom-100); border-color: var(--mom-300); }
    .book-cover-btn.dad { background: var(--dad-100); border-color: var(--dad-300); }
    .bc-emoji { font-size: 50px; margin-bottom: 10px; }
    .bc-name  { font-size: 18px; font-weight: 700; }
    .bc-name.mom { color: var(--mom-700); }
    .bc-name.dad { color: var(--dad-700); }
    .bc-count { font-size: 13px; color: var(--text-light); margin-top: 4px; }

    /* Story view */
    .stories-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
    .stories-header.mom { background: linear-gradient(to bottom, var(--mom-100), var(--bg)); }
    .stories-header.dad { background: linear-gradient(to bottom, var(--dad-100), var(--bg)); }
    .stories-header-inner { display: flex; align-items: center; gap: 14px; margin-top: 10px; }
    .sh-avatar { font-size: 52px; flex-shrink: 0; }

    .story-card {
      background: var(--surface); border-radius: var(--r-md);
      overflow: hidden; margin: 20px 20px 0;
      box-shadow: var(--shadow-sm); border: 1px solid var(--border);
    }
    .story-card:last-child { margin-bottom: 28px; }
    .story-header { padding: 14px 20px; display: flex; flex-direction: column; gap: 4px; }
    .story-header.mom { background: var(--mom-50); border-bottom: 1px solid var(--mom-100); }
    .story-header.dad { background: var(--dad-50); border-bottom: 1px solid var(--dad-100); }
    .story-num    { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-light); }
    .story-q      { font-size: 15px; font-weight: 600; line-height: 1.5; color: var(--text); }
    .story-img    { width: 100%; max-height: 380px; object-fit: cover; display: block; }
    .story-body   { padding: 20px; }
    .story-text   { font-size: 17px; line-height: 2.0; color: var(--text); }
    .story-date   { font-size: 12px; color: var(--text-light); margin-top: 14px; }

    /* ===== LINK BOX ===== */
    .link-box {
      background: #F3F0EA; border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 14px 16px; font-size: 13px; word-break: break-all;
      direction: ltr; text-align: left; color: var(--text-sec); margin-bottom: 16px;
      font-family: monospace;
    }
    .link-actions { display: flex; flex-direction: column; gap: 10px; }

    /* ===== EMPTY STATE ===== */
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-emoji { font-size: 64px; margin-bottom: 14px; }
    .empty-text  { font-size: 17px; color: var(--text-sec); line-height: 1.7; }

    /* ===== SPINNER ===== */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .65s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== EXISTING ANSWER NOTICE ===== */
    .existing-notice {
      background: #E8F5EE; border: 1px solid #B5DEC8; border-radius: var(--r-sm);
      padding: 14px 18px; margin-bottom: 20px; font-size: 15px; color: #2D7A4F;
      font-weight: 500; text-align: center;
    }

    /* ===== UTILS ===== */
    .flex            { display: flex; }
    .items-center    { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mt-1 { margin-top: 4px; }  .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; }
    .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
    .text-sm { font-size: 14px; } .text-xs { font-size: 12px; }
    .text-sec   { color: var(--text-sec); }
    .text-light { color: var(--text-light); }
    .font-bold  { font-weight: 700; }
    .hidden     { display: none !important; }
    .divider    { height: 1px; background: var(--border); margin: 16px 0; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 460px) {
      .book-covers { grid-template-columns: 1fr; max-width: 260px; }
      .q-actions   { flex-direction: column; align-items: flex-start; }
      .tabs .tab   { font-size: 13px; padding: 9px 8px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast-el" class="toast"></div>
  <div id="modal-root"></div>

  <script>
  "use strict";
  // =====================================================================
  // CONSTANTS
  // =====================================================================
  const STORAGE_KEY = 'familyStory_v1';

  const PARENTS = {
    mom: { id: 'mom', name: 'אמא', emoji: '👩', cls: 'mom' },
    dad: { id: 'dad', name: 'אבא', emoji: '👨', cls: 'dad' }
  };

  // =====================================================================
  // DATA LAYER
  // =====================================================================
  let db = { questions: [], answers: [], sent: {}, nextId: 1 };

  function loadDB() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) db = JSON.parse(raw);
    } catch { /* first run */ }
  }

  function saveDB() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
    catch { showToast('⚠️ שגיאה בשמירה — ייתכן שאין מספיק מקום'); }
  }

  function initMockData() {
    loadDB();
    if (db.questions.length > 0) return; // already seeded

    const mockQuestions = [
      'מה היה החלום הגדול שלך כשהיית ילד/ה?',
      'ספר/י לי על הזיכרון המאושר ביותר מהילדות שלך.',
      'מי השפיע עליך הכי הרבה בחיים, ולמה?',
      'מה היה הרגע שהרגשת בו הכי גאה/ה בעצמך?',
      'אם היית יכול/ה לחזור לרגע אחד בחייך, לאיזה רגע היית חוזר/ת?',
      'מה אתה/את רוצה שדור הנכדים ידע עליך?',
      'ספר/י לי על המקום שגדלת בו — איפה זה היה ואיך היה שם?',

    mockQuestions.forEach(text => {
      const id = 'q' + (db.nextId++);

      imageData: null, timestamp: new Date(Date.now() - 3 * 86400000).toISOString()
    });

    saveDB();
  }

  // CRUD helpers
  const getQ = (id) => db.questions.find(q => q.id === id);
  const getAnswerFor = (qId, pId) => db.answers.find(a => a.questionId === qId && a.parentId === pId);
  const getParentAnswers = (pId) => db.answers.filter(a => a.parentId === pId);
  const isSent = (qId, pId) => !!(db.sent[qId]?.[pId]);
  const isAnswered = (qId, pId) => !!getAnswerFor(qId, pId);

  function qStatus(qId, pId) {
    if (isAnswered(qId, pId)) return 'answered';
    if (isSent(qId, pId)) return 'sent';
    return 'notSent';
  }

  function addQuestion(text) {
    const id = 'q' + (db.nextId++);
    db.questions.push({ id, text: text.trim(), createdAt: new Date().toISOString() });
    db.sent[id] = { mom: false, dad: false };
    saveDB();
    return id;
  }

  function updateQuestion(id, text) {
    const q = getQ(id);
    if (q) { q.text = text.trim(); saveDB(); }
  }

  function deleteQuestion(id) {
    db.questions = db.questions.filter(q => q.id !== id);
    db.answers   = db.answers.filter(a => a.questionId !== id);
    delete db.sent[id];
    saveDB();
  }

  function markSent(qId, pId) {
    if (!db.sent[qId]) db.sent[qId] = { mom: false, dad: false };
    db.sent[qId][pId] = true;
    saveDB();
  }

  function saveAnswer(qId, pId, text, imageData) {
    const idx = db.answers.findIndex(a => a.questionId === qId && a.parentId === pId);
    const entry = { id: 'a'+(db.nextId++), questionId: qId, parentId: pId, text: text.trim(), imageData: imageData||null, timestamp: new Date().toISOString() };
    if (idx >= 0) db.answers[idx] = entry; else db.answers.push(entry);
    saveDB();
  }

  // =====================================================================

  function getRoute() {
    const hash = window.location.hash.slice(1) || 'home';
    const [path, qs] = hash.split('?');
    const params = {};
    if (qs) qs.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return { path: path || 'home', params };
  }

  function navigate(path, params = {}) {
    const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
    window.location.hash = path + (qs ? '?' + qs : '');
  }

  function generateAnswerLink(qId, pId) {
    const base = window.location.href.split('#')[0];
    return `${base}#answer?parent=${pId}&q=${qId}`;
  }

  let _toastTimer;
  function showToast(msg, ms = 3000) {
    const el = document.getElementById('toast-el');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
  }

  let _modalCloseCallback = null;
  function showModal(html, onClose = null) {
    _modalCloseCallback = onClose;
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-overlay" id="modal-overlay">${html}</div>`;
    const overlay = document.getElementById('modal-overlay');
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  }
  function closeModal() {
    document.getElementById('modal-root').innerHTML = '';
    if (_modalCloseCallback) { _modalCloseCallback(); _modalCloseCallback = null; }
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('he-IL', { day:'numeric', month:'long', year:'numeric' });
  }
  function fmtDateTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('he-IL', { day:'numeric', month:'long', hour:'2-digit', minute:'2-digit' });
  }

  async function compressImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = e => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          const MAX = 900;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            const r = Math.min(MAX / w, MAX / h);
            w = Math.round(w * r); h = Math.round(h * r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.78));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => showToast('✅ הקישור הועתק!'));
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); showToast('✅ הקישור הועתק!');
    }
  }

  // =====================================================================
  // SPEECH RECOGNITION
  // =====================================================================
  let recognition = null;
  let isRecording  = false;

  function initSpeech() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    if (!recognition) {
      recognition = new SR();
      recognition.lang = 'he-IL';
      recognition.continuous = true;
      recognition.interimResults = true;
    }
    return true;
  }

  function toggleMic(textareaId, btnId, parentCls) {
    if (!recognition) { showToast('דפדפן זה אינו תומך בזיהוי דיבור'); return; }
    const btn = document.getElementById(btnId);
    const ta  = document.getElementById(textareaId);
    if (!btn || !ta) return;

    if (isRecording) {
      recognition.stop();
      isRecording = false;
      btn.classList.remove('recording');
      btn.title = 'לחץ לדיבור';
      btn.innerHTML = '🎤';
    } else {
      let baseText = ta.value;
      recognition.onresult = ev => {
        let fin = '', int = '';
        for (let i = ev.resultIndex; i < ev.results.length; i++) {
          const t = ev.results[i][0].transcript;
          if (ev.results[i].isFinal) fin += t; else int += t;
        }
        if (fin) baseText += fin + ' ';
        ta.value = baseText + int;
        ta.scrollTop = ta.scrollHeight;
      };
      recognition.onerror = e => {
        if (e.error !== 'no-speech') showToast('שגיאה: ' + e.error);
        isRecording = false;
        btn.classList.remove('recording');
        btn.innerHTML = '🎤';
      };
      recognition.onend = () => { if (isRecording) recognition.start(); };
      recognition.start();
      isRecording = true;
      btn.classList.add('recording');
      btn.title = 'לחץ לעצור';
      btn.innerHTML = '⏹️';
    }
  }

  function stopMic() {
    if (recognition && isRecording) { recognition.stop(); isRecording = false; }
  }

          ${ans.imageData ? `<img src="${ans.imageData}" class="story-img" alt="תמונה">` : ''}
          <div class="story-body">
            <div class="story-text">${esc(ans.text).replace(/\n/g,'<br>')}</div>
            <div class="story-date">✍️ ${fmtDate(ans.timestamp)}</div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="book-page">
        <div class="stories-header ${pId}">
          <button class="btn btn-ghost btn-sm" onclick="navigate('book')">← כל הסיפורים</button>
          <div class="stories-header-inner">
            <span class="sh-avatar">${p.emoji}</span>
            <div>
              <h2>הסיפור של ${p.name}</h2>
              <p class="text-sm text-sec mt-1">${answers.length} ${answers.length===1?'סיפור':'סיפורים'} נשמרו</p>
            </div>
          </div>
        </div>
        ${answers.length === 0
          ? `<div class="empty-state"><div class="empty-emoji">✨</div><div class="empty-text">${p.name} עדיין לא ענה/ענתה על שאלות.<br>שלח/י שאלות מלוח הבקרה!</div></div>`
          : cards + '<div style="height:28px"></div>'}
      </div>`;
  }

  // =====================================================================
  // VIEW: THANKS
  // =====================================================================
  function renderThanks(params) {
    stopMic();
    const pId = params?.parent;
    const p = PARENTS[pId] || {};
    document.getElementById('app').innerHTML = `
      <div class="thanks-page ${pId || ''}">
        <div class="thanks-emoji">💛</div>
        <h1 style="text-align:center">תודה רבה, ${p.name || ''}!</h1>
        <p class="thanks-text">
          הסיפור שלך נשמר בספר המשפחה שלנו ויישמר שם לתמיד. ✨<br><br>
          כל מילה שכתבת היא מתנה יקרת ערך לדורות הבאים. 💖
        </p>
      </div>`;
  }

  // =====================================================================
  // MODAL: SEND TO PARENT
  // =====================================================================
  function openSendModal(qId, pId) {
    const p = PARENTS[pId];
    const link = generateAnswerLink(qId, pId);
    markSent(qId, pId);

    const wa = 'https://wa.me/?text=' + encodeURIComponent(
      `היי ${p.name}! 💛\nשאלה מיוחדת מחכה לך בספר המשפחה שלנו.\n\nלחצ/י כאן כדי לענות:\n${link}`
    );

    showModal(`
      <div class="modal">
        <div class="modal-header">
          <h3>${p.emoji} קישור ל${p.name}</h3>
          <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
        </div>
        <p class="text-sec mb-4">הקישור הייחודי נוצר! שלח/י אותו ל${p.name} בוואטסאפ.</p>
        <div class="link-box">${esc(link)}</div>
        <div class="link-actions">
          <a class="btn btn-primary btn-full" href="${esc(wa)}" target="_blank" rel="noopener"
            onclick="setTimeout(closeModal,200)">
            📱 פתח בוואטסאפ — שלח ל${p.name}
          </a>
          <button class="btn btn-outline btn-full" onclick="copyToClipboard(decodeURIComponent('${encodeURIComponent(link)}')); closeModal()">
            📋 העתק קישור ללוח
          </button>
          <button class="btn btn-ghost btn-full" onclick="closeModal()">סגור</button>
        </div>
      </div>`,
      () => { const el = document.getElementById('admin-tab-content'); if (el) el.innerHTML = renderAdminTabContent(); }
    );
  }

  // =====================================================================
  // MODAL: EDIT QUESTION
  // =====================================================================
  function openEditModal(qId) {
    const q = getQ(qId);
    if (!q) return;
    showModal(`
      <div class="modal">
        <div class="modal-header">
          <h3>✏️ ערוך שאלה</h3>
          <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
        </div>
        <div class="form-group">
          <textarea id="edit-q-ta" class="form-textarea" rows="4">${esc(q.text)}</textarea>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-primary btn-full" onclick="doEditQuestion('${qId}')">שמור שינויים</button>
          <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
        </div>
      </div>`,
      () => { const el = document.getElementById('admin-tab-content'); if (el) el.innerHTML = renderAdminTabContent(); }
    );
  }

  // =====================================================================
  // MODAL: DELETE QUESTION
  // =====================================================================
  function openDeleteModal(qId) {
    const q = getQ(qId);
    if (!q) return;
    showModal(`
      <div class="modal">
        <div class="modal-header">
          <h3>🗑️ מחיקת שאלה</h3>
          <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
        </div>
        <p class="text-sec mb-2" style="line-height:1.7">
          האם למחוק את השאלה הזו?<br>
          <strong>"${esc(q.text.substring(0,60))}${q.text.length>60?'...':''}"</strong>
        </p>
        <p class="text-sm text-light mb-4">גם כל התשובות על שאלה זו יימחקו לצמיתות.</p>
        <div class="flex gap-2">
          <button class="btn btn-danger btn-full" onclick="doDeleteQuestion('${qId}')">כן, מחק</button>
          <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
        </div>
      </div>`,
      () => { const el = document.getElementById('admin-tab-content'); if (el) el.innerHTML = renderAdminTabContent(); }
    );
  }

  // =====================================================================
  // ACTION HANDLERS
  // =====================================================================
  function doAddQuestion() {
    const ta = document.getElementById('new-q-input');
    const text = ta?.value?.trim();
    if (!text) { showToast('נא להזין טקסט לשאלה'); return; }
    addQuestion(text);
    ta.value = '';
    const el = document.getElementById('admin-tab-content');
    if (el) el.innerHTML = renderAdminTabContent();
    showToast('✅ השאלה נוספה לבנק!');
  }

  function doEditQuestion(qId) {
    const ta = document.getElementById('edit-q-ta');
    const text = ta?.value?.trim();
    if (!text) { showToast('נא להזין טקסט'); return; }
    updateQuestion(qId, text);
    closeModal();
    showToast('✅ השאלה עודכנה!');
  }

  function doDeleteQuestion(qId) {
    deleteQuestion(qId);
    closeModal();
    showToast('🗑️ השאלה נמחקה');
  }

  async function handleImgSelect(input) {
    const file = input?.files?.[0];
    if (!file) return;
    try {
      const data = await compressImage(file);
      pendingImageData = data;
      const wrap = document.getElementById('img-preview-wrap');
      const prev = document.getElementById('img-preview');
      const area = document.getElementById('img-upload-area');
      if (prev)  prev.src = data;
      if (wrap)  wrap.classList.remove('hidden');
      if (area)  area.classList.add('hidden');
    } catch { showToast('שגיאה בטעינת התמונה'); }
  }

  function removeImg() {
    pendingImageData = null;
    const wrap = document.getElementById('img-preview-wrap');
    const area = document.getElementById('img-upload-area');
    const input = document.getElementById('img-file');
    if (wrap)  wrap.classList.add('hidden');
    if (area)  area.classList.remove('hidden');
    if (input) input.value = '';
  }

  function doSubmitAnswer(qId, pId) {
    const ta = document.getElementById('ans-ta');
    const text = ta?.value?.trim();
    if (!text) { showToast('נא לכתוב תשובה לפני השליחה 💛'); return; }

    stopMic();
    const btn = document.getElementById('submit-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> שומר...'; }

    setTimeout(() => {
      saveAnswer(qId, pId, text, pendingImageData);
      pendingImageData = null;
      navigate('thanks', { parent: pId });
    }, 700);
  }

  // =====================================================================
  // MAIN RENDER ENGINE
  // =====================================================================
  function render() {
    stopMic();
    const { path, params } = getRoute();
    switch (path) {
      case 'home':   renderHome();          break;
      case 'admin':  renderAdmin();         break;
      case 'answer': renderAnswer(params);  break;
      case 'book':   renderBook(params);    break;
      case 'thanks': renderThanks(params);  break;
      default:       renderHome();
    }
    window.scrollTo({ top: 0, behavior: 'auto' });
  }

  // =====================================================================
  // BOOTSTRAP
  // =====================================================================
  window.addEventListener('hashchange', render);
  window.addEventListener('DOMContentLoaded', () => {
    initMockData();
    render();
  });
  </script>
</body>
</html>
