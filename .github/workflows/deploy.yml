name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Create Vercel project, set env vars, and deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          # Get org (user) ID
          ORG_ID=$(curl -s https://api.vercel.com/v2/user \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['user']['id'])")
          echo "Org ID: $ORG_ID"

          # Create project (ignore error if already exists)
          curl -s -X POST "https://api.vercel.com/v10/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"presenter-ai","framework":"nextjs","rootDirectory":"frontend"}' > /dev/null

          # Get project ID
          PROJECT_ID=$(curl -s "https://api.vercel.com/v10/projects/presenter-ai" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Project ID: $PROJECT_ID"

          # Link project locally
          mkdir -p .vercel
          echo "{\"projectId\":\"$PROJECT_ID\",\"orgId\":\"$ORG_ID\"}" > .vercel/project.json

          # Fetch all existing env var IDs once
          ENV_LIST=$(curl -s "https://api.vercel.com/v10/projects/$PROJECT_ID/env?limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          # Upsert env var: PATCH if exists, POST if new
          add_env() {
            local KEY="$1"
            local VALUE="$2"
            local ENV_ID
            ENV_ID=$(echo "$ENV_LIST" | python3 -c "import sys,json; d=json.load(sys.stdin); m=next((e for e in d.get('envs',[]) if e['key']=='$KEY'),None); print(m['id'] if m else '')" 2>/dev/null)
            if [ -n "$ENV_ID" ]; then
              curl -s -X PATCH "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$ENV_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\":\"$VALUE\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" > /dev/null
            else
              curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" > /dev/null
            fi
          }

          add_env "DATABASE_URL"        "$DATABASE_URL"
          add_env "JWT_SECRET"          "$JWT_SECRET"
          add_env "NEXT_PUBLIC_APP_URL" "$NEXT_PUBLIC_APP_URL"
          add_env "DEFAULT_CREDITS"     "100"
          add_env "GITHUB_CLIENT_ID"    "${{ secrets.GITHUB_OAUTH_CLIENT_ID }}"
          add_env "GITHUB_CLIENT_SECRET" "${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}"
          add_env "GITHUB_CALLBACK_URL" "$NEXT_PUBLIC_APP_URL/api/auth/github/callback"
          add_env "GOOGLE_CLIENT_ID"    "${{ secrets.GOOGLE_CLIENT_ID }}"
          add_env "GOOGLE_CLIENT_SECRET" "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          add_env "GOOGLE_CALLBACK_URL" "$NEXT_PUBLIC_APP_URL/api/auth/google/callback"
          add_env "NEXT_PUBLIC_GOOGLE_CLIENT_ID" "${{ secrets.GOOGLE_CLIENT_ID }}"
          add_env "RESEND_API_KEY"      "${{ secrets.RESEND_API_KEY }}"

          echo "✅ Environment variables set"

          # Deploy source directly — Vercel builds on its RHEL servers
          # so Prisma generates the correct binary automatically
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          DEPLOY_URL=$(vercel deploy --prod --token=$VERCEL_TOKEN)
          echo "🚀 Deployed to: $DEPLOY_URL"

      - name: Push database schema to Neon
        working-directory: frontend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm install
          npx prisma db push --accept-data-loss
          echo "✅ Database schema pushed"
